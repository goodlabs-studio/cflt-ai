# FSI industry overrides — each override references an ADR
# These compose on top of canon/base/defaults.yaml via dict merge
# Override rule: no override without an ADR reference

schema_registry:
  format: "avro"
  override_source: "fsi-dsp://adr/001"      # ADR-001: Avro over Protobuf
  compatibility_mode: "tier-derived"
  compatibility_source: "fsi-dsp://adr/002"  # ADR-002: Compatibility by tier

cluster_linking:
  preferred_over: "mirrormaker2"
  override_source: "fsi-dsp://adr/005"       # ADR-005: Cluster Linking over MRC
  dr_tier_classification: "fsi-dsp://adr/008"  # ADR-008: DR tier classification

security:
  auth_mechanism: "mTLS + RBAC"              # Reinforced: never username/password in FSI
  override_source: "fsi-dsp://adr/006"       # ADR-006: OAuth vs API keys

topic_design:
  naming_convention: "<domain>.<application>.<entity>.<event>"
  naming_source: "fsi-dsp://adr/007"         # ADR-007: Topic naming

# FSI-specific additions (not overrides of base)
latency_tiers:
  market_data: "sub-millisecond"
  risk: "<10ms"
  compliance: "<100ms"
  reconciliation: "async"

mainframe_integration:
  bridge_pattern: "IBM MQ Source Connector -> Kafka"
  compute: "IBM LinuxONE preferred for z/OS offload"
  linuxone_source: "fsi-dsp://adr/009"       # ADR-009: LinuxONE for z/OS Kafka offload

# Phase 11: Canon keys for the LinuxONE accelerator's 5 kustomize layers.
# Flat dotted-path keys (intentional — composite map in tools/check-canon-parity.py
# uses literal string keys, not nested traversal). Source-of-truth ties each key
# back to the upstream MANIFEST.yaml apply_sequence entry.
fsi.security.mds-rbac:
  _source: "fsi-dsp://accelerator/confluent-on-linuxone/01-rbac"
  description: "MDS RBAC role bindings for Confluent Platform on LinuxONE"
fsi.security.tls-fips:
  _source: "fsi-dsp://accelerator/confluent-on-linuxone/02-tls"
  description: "FIPS 140-2 mTLS configuration baseline for LinuxONE deployments"
fsi.schema.compatibility-full-transitive:
  _source: "fsi-dsp://accelerator/confluent-on-linuxone/03-schema-governance"
  description: "FULL_TRANSITIVE compatibility mode for FSI critical-tier subjects"
fsi.audit.events-retention:
  _source: "fsi-dsp://accelerator/confluent-on-linuxone/04-audit"
  description: "7-year audit-event retention (OFAC/AML regulatory)"
fsi.flink.environment-mtls:
  _source: "fsi-dsp://accelerator/confluent-on-linuxone/05-flink"
  description: "mTLS-authenticated Flink environment for FSI workloads"
