name: Release

# Builds, signs, and notarizes the macOS app on tagged releases.
#
# Trigger: push a tag matching `app-v*` (e.g. `app-v0.1.0`).
# Required repo secrets:
#   APPLE_ID                       — Apple ID email for notarization
#   APPLE_APP_SPECIFIC_PASSWORD    — App-Specific Password from appleid.apple.com
#   APPLE_TEAM_ID                  — Developer Team ID (10-char alphanumeric)
#   CSC_LINK                       — base64-encoded .p12 of Developer ID Application cert
#   CSC_KEY_PASSWORD               — password for the .p12
#   GH_TOKEN                       — GitHub token for publishing release assets
#
# Until those secrets are configured the workflow will start, fail at
# the build step, and produce a clear error in the Actions log. F.3 wires
# the autoupdater that will consume these published artifacts.

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build, sign, notarize, publish
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --publish always
